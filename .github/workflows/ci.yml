      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno ${{ matrix.task }}
        run: |
          if [ "${{ matrix.task }}" = "fmt" ]; then
            deno fmt --check extensions/reports/
          elif [ "${{ matrix.task }}" = "lint" ]; then
            deno lint extensions/reports/
          else
            deno check extensions/reports/cloudflare_audit_report.ts
          fi

  cloudflare-audit-test:
    name: cloudflare-audit - test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-audit
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno test
        run: deno test extensions/reports/

  sre-report-check:
    name: sre - ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [check, lint, fmt]
    defaults:
      run:
        working-directory: sre
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno ${{ matrix.task }}
        run: |
          if [ "${{ matrix.task }}" = "fmt" ]; then
            deno fmt --check extensions/reports/
          elif [ "${{ matrix.task }}" = "lint" ]; then
            deno lint extensions/reports/
          else
            deno check extensions/reports/sre_health_report.ts
          fi

  sre-test:
    name: sre - test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sre
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno test
        run: deno test extensions/reports/

  redmine-check:
    name: redmine - ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [check, lint, fmt]
    defaults:
      run:
        working-directory: redmine
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno ${{ matrix.task }}
        run: |
          if [ "${{ matrix.task }}" = "fmt" ]; then
            deno fmt --check extensions/models/ extensions/reports/
          elif [ "${{ matrix.task }}" = "lint" ]; then
            deno lint extensions/models/ extensions/reports/
          else
            deno check extensions/models/redmine/*.ts extensions/models/redmine/_lib/*.ts extensions/reports/*.ts
          fi

  redmine-test:
    name: redmine - test
    runs-on: ubuntu-latest
    defaults:
