name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vault-check:
    name: vault/${{ matrix.vault }} - ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vault: [pass, gopass, hashicorp-vault]
        task: [check, lint, fmt, test]
    defaults:
      run:
        working-directory: vault/${{ matrix.vault }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno ${{ matrix.task }}
        run: |
          if [ "${{ matrix.task }}" = "fmt" ]; then
            deno fmt --check extensions/vaults/
          elif [ "${{ matrix.task }}" = "lint" ]; then
            deno lint extensions/vaults/
          elif [ "${{ matrix.task }}" = "test" ]; then
            # Run tests if any exist
            if ls extensions/vaults/*_test.ts 1> /dev/null 2>&1; then
              deno test --allow-env --allow-run --allow-net extensions/vaults/
            else
              echo "No tests found, skipping"
            fi
          else
            # Check all .ts files except test files
            deno check extensions/vaults/*.ts
          fi

  aws-model-check:
    name: aws/${{ matrix.extension }} - ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extension: [pricing, inventory, logs, metrics, alarms, traces, cost-estimate, cost-explorer, networking]
        task: [check, lint, fmt, test]
    defaults:
      run:
        working-directory: aws/${{ matrix.extension }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno ${{ matrix.task }}
        run: |
          if [ "${{ matrix.task }}" = "fmt" ]; then
            deno fmt --check extensions/models/
          elif [ "${{ matrix.task }}" = "lint" ]; then
            deno lint extensions/models/
          elif [ "${{ matrix.task }}" = "test" ]; then
            if ls extensions/models/aws/*_test.ts 1> /dev/null 2>&1; then
              deno test --allow-env --allow-net --allow-sys extensions/models/
            else
              echo "No tests found, skipping"
            fi
          else
            deno check extensions/models/aws/*.ts
          fi

  aws-report-check:
    name: aws/${{ matrix.extension }} - ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extension: [cost-report, ops, cost-audit]
        task: [check, lint, fmt, test]
    defaults:
      run:
        working-directory: aws/${{ matrix.extension }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno ${{ matrix.task }}
        run: |
          if [ "${{ matrix.task }}" = "fmt" ]; then
            deno fmt --check extensions/reports/
          elif [ "${{ matrix.task }}" = "lint" ]; then
            deno lint extensions/reports/
          elif [ "${{ matrix.task }}" = "test" ]; then
            if ls extensions/reports/*_test.ts 1> /dev/null 2>&1; then
              deno test --allow-env --allow-net --allow-read --allow-write --allow-sys extensions/reports/
            else
              echo "No tests found, skipping"
            fi
          else
            deno check extensions/reports/*.ts
          fi

  model-check:
    name: ${{ matrix.extension }} - ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extension:
          - { dir: cloudflare, models: cloudflare }
          - { dir: github, models: github }
          - { dir: gitlab, models: gitlab }
          - { dir: system, models: system }
          - { dir: network, models: network }
        task: [check, lint, fmt]
    defaults:
      run:
        working-directory: ${{ matrix.extension.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno ${{ matrix.task }}
        run: |
          if [ "${{ matrix.task }}" = "fmt" ]; then
            deno fmt --check extensions/models/
          elif [ "${{ matrix.task }}" = "lint" ]; then
            deno lint extensions/models/
          else
            deno check extensions/models/${{ matrix.extension.models }}/*.ts
          fi

  cloudflare-test:
    name: cloudflare - test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno test
        run: |
          if ls extensions/models/cloudflare/*_test.ts 1> /dev/null 2>&1; then
            deno test --allow-net extensions/models/
          else
            echo "No tests found, skipping"
          fi

  network-test:
    name: network - test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: network
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno test
        run: deno test --allow-env --allow-net=0.0.0.0 --allow-read extensions/models/

  system-test:
    name: system - test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: system
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
