name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vault-check:
    name: vault/${{ matrix.vault }} - ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vault: [pass, gopass, hashicorp-vault]
        task: [check, lint, fmt, test]
    defaults:
      run:
        working-directory: vault/${{ matrix.vault }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno ${{ matrix.task }}
        run: |
          if [ "${{ matrix.task }}" = "fmt" ]; then
            deno fmt --check extensions/vaults/
          elif [ "${{ matrix.task }}" = "lint" ]; then
            deno lint extensions/vaults/
          elif [ "${{ matrix.task }}" = "test" ]; then
            # Run tests if any exist
            if ls extensions/vaults/*_test.ts 1> /dev/null 2>&1; then
              deno test --allow-env --allow-run --allow-net extensions/vaults/
            else
              echo "No tests found, skipping"
            fi
          else
            # Check all .ts files except test files
            deno check extensions/vaults/*.ts
          fi

  aws-model-check:
    name: aws/${{ matrix.extension }} - ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extension: [pricing, inventory, logs, metrics, alarms, traces, cost-estimate]
        task: [check, lint, fmt]
    defaults:
      run:
        working-directory: aws/${{ matrix.extension }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno ${{ matrix.task }}
        run: |
          if [ "${{ matrix.task }}" = "fmt" ]; then
            deno fmt --check extensions/models/
          elif [ "${{ matrix.task }}" = "lint" ]; then
            deno lint extensions/models/
          else
            deno check extensions/models/aws/*.ts
          fi

  aws-report-check:
    name: aws/${{ matrix.extension }} - ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extension: [cost-report, ops]
        task: [check, lint, fmt]
    defaults:
      run:
        working-directory: aws/${{ matrix.extension }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno ${{ matrix.task }}
        run: |
          if [ "${{ matrix.task }}" = "fmt" ]; then
            deno fmt --check extensions/reports/
          elif [ "${{ matrix.task }}" = "lint" ]; then
            deno lint extensions/reports/
          else
            deno check extensions/reports/*.ts
          fi

  cloudflare-check:
    name: cloudflare - ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [check, lint, fmt, test]
    defaults:
      run:
        working-directory: cloudflare
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno ${{ matrix.task }}
        run: |
          if [ "${{ matrix.task }}" = "fmt" ]; then
            deno fmt --check extensions/models/
          elif [ "${{ matrix.task }}" = "lint" ]; then
            deno lint extensions/models/
          elif [ "${{ matrix.task }}" = "test" ]; then
            # Run tests if any exist
            if ls extensions/models/cloudflare/*_test.ts 1> /dev/null 2>&1; then
              deno test --allow-net extensions/models/
            else
              echo "No tests found, skipping"
            fi
          else
            deno check extensions/models/cloudflare/*.ts
          fi

  manifest-validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: systeminit/setup-swamp@v0.1.0
      - name: Validate all manifests
        run: |
          for manifest in $(find . -name "manifest.yaml" -not -path "./.git/*"); do
            dir=$(dirname "$manifest")
            echo "Validating $manifest"
            (cd "$dir" && swamp extension fmt manifest.yaml --check)
          done

  adversarial-review:
    name: Adversarial Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
        with:
          use_bedrock: "true"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          display_report: "true"
          allowed_tools: "Read,Glob,Grep,Bash(gh pr diff:*),Bash(gh pr review:*),Bash(touch /tmp/review-failed)"
          prompt: |
            TASK: Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}

            STEPS:
            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to see the changes
            2. Read any changed files that need deeper inspection
            3. If CLAUDE.md exists, read it for project conventions
            4. Analyze for: logic errors, security issues, error handling gaps, breaking changes
            5. REQUIRED: Submit your review using gh pr review (see format below)

            REVIEW FORMAT - You MUST run one of these commands:

            If NO critical issues found:
            ```
            gh pr review ${{ github.event.pull_request.number }} --comment --body "## Adversarial Review

            **Verdict: PASS**

            [Your findings or 'No significant issues found']"
            ```

            If critical issues found:
            ```
            gh pr review ${{ github.event.pull_request.number }} --request-changes --body "## Adversarial Review

            **Verdict: FAIL**

            [List each issue with file, line, description, fix]"
            touch /tmp/review-failed
            ```

            IMPORTANT: You MUST call `gh pr review` before finishing. This is required.

      - name: Fail if changes requested
        shell: bash
        run: |
          if [ -f /tmp/review-failed ]; then
            echo "::error::Adversarial review requested changes"
            exit 1
          fi
