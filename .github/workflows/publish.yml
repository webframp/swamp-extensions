name: Publish Extensions

on:
  workflow_run:
    # NOTE: Must match the `name:` field in ci.yml exactly
    workflows: ["CI"]
    types: [completed]

jobs:
  detect-changes:
    name: Detect changed extensions
    runs-on: ubuntu-latest
    # Only run when CI succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      extensions: ${{ steps.changes.outputs.extensions }}
      channel: ${{ steps.changes.outputs.channel }}
    steps:
      - name: Verify source repository
        env:
          HEAD_REPO: ${{ github.event.workflow_run.head_repository.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "::error::Refusing to publish from fork: $HEAD_REPO"
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
      - id: changes
        name: Find extensions with changes
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Determine channel: stable if the commit is on main, beta otherwise.
          # workflow_run.head_branch is unreliable for squash merges (reports
          # the PR branch name, not 'main'), so we check git directly.
          if git branch -r --contains "$HEAD_SHA" | grep -q "origin/main"; then
            CHANNEL="stable"
          elif [ "$HEAD_BRANCH" = "main" ]; then
            CHANNEL="stable"
          else
            CHANNEL="beta"
          fi
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Channel: $CHANNEL (branch: $HEAD_BRANCH, sha: ${HEAD_SHA:0:8})"

          # Compare against the parent commit
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

          echo "Changed files:"
          echo "$CHANGED_FILES"

          EXTENSIONS="[]"

          # Find extensions where manifest.yaml itself changed (version bump required to publish)
          for manifest in $(find . -name "manifest.yaml" -not -path "./.git/*"); do
            dir=$(dirname "$manifest" | sed 's|^\./||')
            if echo "$CHANGED_FILES" | grep -q "^${dir}/manifest\.yaml$"; then
              EXTENSIONS=$(echo "$EXTENSIONS" | jq -c ". + [\"${dir}\"]")
              echo "Extension changed: ${dir}"
            fi
          done

          echo "extensions=$EXTENSIONS" >> "$GITHUB_OUTPUT"
          echo "Extensions to publish: $EXTENSIONS (channel: $CHANNEL)"

  publish:
    name: Publish ${{ matrix.extension }}
    needs: detect-changes
    if: needs.detect-changes.outputs.extensions != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        extension: ${{ fromJson(needs.detect-changes.outputs.extensions) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: systeminit/setup-swamp@v0.1.0
        with:
          api-key: ${{ secrets.SWAMP_API_KEY }}
      - name: Extract manifest info
        id: manifest
        working-directory: ${{ matrix.extension }}
        run: |
          NAME=$(yq -r '.name' manifest.yaml)
          VERSION=$(yq -r '.version' manifest.yaml)

          # Fail if extraction failed
          if [ -z "$NAME" ] || [ -z "$VERSION" ] || [ "$NAME" = "null" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Failed to extract name or version from manifest.yaml"
            exit 1
          fi

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extension: $NAME@$VERSION"

      - name: Publish extension
        working-directory: ${{ matrix.extension }}
        env:
          CHANNEL: ${{ needs.detect-changes.outputs.channel }}
        run: |
          PUSH_ARGS=(swamp extension push manifest.yaml --yes)

          if [ "$CHANNEL" != "stable" ]; then
            PUSH_ARGS+=(--channel "$CHANNEL")
          fi

          if [ -f RELEASE_NOTES.md ]; then
            PUSH_ARGS+=(--release-notes "$(cat RELEASE_NOTES.md)")
          fi

          "${PUSH_ARGS[@]}"

      - name: Create GitHub release
        # Only create GH releases for stable channel
        if: needs.detect-changes.outputs.channel == 'stable'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXT_NAME: ${{ steps.manifest.outputs.name }}
          EXT_VERSION: ${{ steps.manifest.outputs.version }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        working-directory: ${{ matrix.extension }}
        run: |
          TAG="${EXT_NAME}@${EXT_VERSION}"

          # Check if release already exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi

          if [ -f RELEASE_NOTES.md ]; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file RELEASE_NOTES.md \
              --target "$HEAD_SHA"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Published to swamp.club registry" \
              --target "$HEAD_SHA"
          fi
