name: Publish Extensions

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  detect-changes:
    name: Detect changed extensions
    runs-on: ubuntu-latest
    # Only run when CI succeeded on main
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      extensions: ${{ steps.changes.outputs.extensions }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
      - id: changes
        name: Find extensions with changes
        run: |
          # Compare against the parent commit
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

          echo "Changed files:"
          echo "$CHANGED_FILES"

          EXTENSIONS="[]"

          # Find extensions where manifest.yaml itself changed (version bump required to publish)
          for manifest in $(find . -name "manifest.yaml" -not -path "./.git/*"); do
            dir=$(dirname "$manifest" | sed 's|^\./||')
            if echo "$CHANGED_FILES" | grep -q "^${dir}/manifest\.yaml$"; then
              EXTENSIONS=$(echo "$EXTENSIONS" | jq -c ". + [\"${dir}\"]")
              echo "Extension changed: ${dir}"
            fi
          done

          echo "extensions=$EXTENSIONS" >> "$GITHUB_OUTPUT"
          echo "Extensions to publish: $EXTENSIONS"

  publish:
    name: Publish ${{ matrix.extension }}
    needs: detect-changes
    if: needs.detect-changes.outputs.extensions != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        extension: ${{ fromJson(needs.detect-changes.outputs.extensions) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: systeminit/setup-swamp@v0.1.0
        with:
          api-key: ${{ secrets.SWAMP_API_KEY }}
      - name: Extract manifest info
        id: manifest
        working-directory: ${{ matrix.extension }}
        run: |
          NAME=$(yq -r '.name' manifest.yaml)
          VERSION=$(yq -r '.version' manifest.yaml)

          # Fail if extraction failed
          if [ -z "$NAME" ] || [ -z "$VERSION" ] || [ "$NAME" = "null" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Failed to extract name or version from manifest.yaml"
            exit 1
          fi

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extension: $NAME@$VERSION"

      - name: Publish extension
        working-directory: ${{ matrix.extension }}
        run: swamp extension push manifest.yaml --yes

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXT_NAME: ${{ steps.manifest.outputs.name }}
          EXT_VERSION: ${{ steps.manifest.outputs.version }}
        run: |
          TAG="${EXT_NAME}@${EXT_VERSION}"

          # Check if release already exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Published to swamp.club registry" \
            --target "${{ github.event.workflow_run.head_sha }}"
