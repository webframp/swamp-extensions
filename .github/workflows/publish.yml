name: Publish Extensions

on:
  push:
    branches: [main]

jobs:
  detect-changes:
    name: Detect changed extensions
    runs-on: ubuntu-latest
    outputs:
      extensions: ${{ steps.changes.outputs.extensions }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changes
        name: Find extensions with changes
        run: |
          # Compare against the previous commit on main
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # First push to branch — compare against parent
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          elif ! git cat-file -e "$BEFORE" 2>/dev/null; then
            # Before commit doesn't exist (force push) — compare against parent
            echo "Note: Previous commit $BEFORE not found (likely force push), comparing against HEAD~1"
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED_FILES=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          EXTENSIONS="[]"

          # Find all extension directories (those containing a manifest.yaml)
          for manifest in $(find . -name "manifest.yaml" -not -path "./.git/*"); do
            dir=$(dirname "$manifest" | sed 's|^\./||')
            if echo "$CHANGED_FILES" | grep -q "^${dir}/"; then
              EXTENSIONS=$(echo "$EXTENSIONS" | jq -c ". + [\"${dir}\"]")
              echo "Extension changed: ${dir}"
            fi
          done

          echo "extensions=$EXTENSIONS" >> "$GITHUB_OUTPUT"
          echo "Extensions to publish: $EXTENSIONS"

  publish:
    name: Publish ${{ matrix.extension }}
    needs: detect-changes
    if: needs.detect-changes.outputs.extensions != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        extension: ${{ fromJson(needs.detect-changes.outputs.extensions) }}
    steps:
      - uses: actions/checkout@v4
      - uses: systeminit/setup-swamp@v0.1.0
        with:
          api-key: ${{ secrets.SWAMP_API_KEY }}
      - name: Extract manifest info
        id: manifest
        working-directory: ${{ matrix.extension }}
        run: |
          # Extract name and version, stripping both single and double quotes
          NAME=$(grep '^name:' manifest.yaml | sed "s/name: *[\"']\\?\\([^\"']*\\)[\"']\\?/\\1/")
          VERSION=$(grep '^version:' manifest.yaml | sed "s/version: *[\"']\\?\\([^\"']*\\)[\"']\\?/\\1/")

          # Fail if extraction failed
          if [ -z "$NAME" ] || [ -z "$VERSION" ]; then
            echo "::error::Failed to extract name or version from manifest.yaml"
            exit 1
          fi

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extension: $NAME@$VERSION"

      - name: Publish extension
        working-directory: ${{ matrix.extension }}
        run: swamp extension push manifest.yaml --yes

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.manifest.outputs.name }}@${{ steps.manifest.outputs.version }}"

          # Check if release already exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Published to swamp.club registry" \
            --target "${{ github.sha }}"
