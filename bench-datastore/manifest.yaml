manifestVersion: 1
name: "@webframp/bench-datastore"
version: "2026.07.24.1"
description: |
  Datastore benchmarking harness for swamp. Two workflow-based test
  scenarios that exercise any swamp datastore backend under sustained load
  without lock contention.

  ## Scenario A: Throughput (breadth)

  Each worker owns isolated models. Cycles through write → read → query
  operations measuring per-step latency. Tests: sync push/pull speed,
  chunked storage, GSI queries, workflow overhead.

  ## Scenario B: Write Stress (depth)

  Each worker owns one model, writes continuously with varying payload
  sizes. Tests: sustained single-writer throughput, version accumulation,
  chunked vs inline performance, hot-partition behavior.

  ## Usage

  ```bash
  swamp extension pull @webframp/bench-datastore

  # Create harness model
  swamp model create @webframp/bench-datastore/harness bench-harness

  # Setup for worker 1 (creates its models)
  swamp model method run bench-harness setup \
    --input worker_id=1 --input scenario=throughput --input models_per_worker=50

  # Run scenario A once
  swamp workflow run @webframp/bench-throughput-cycle \
    --input worker_id=1 --input iteration=1

  # Run scenario B once
  swamp workflow run @webframp/bench-write-stress \
    --input worker_id=1 --input iteration=1 --input payload_size=medium
  ```

  Both workflows are designed to be called in a tight loop by an ECS
  Fargate worker or local script. Duration is controlled by the caller.
repository: "https://github.com/webframp/swamp-extensions"
models:
  - harness.ts
workflows:
  - bench-throughput-cycle.yaml
  - bench-write-stress.yaml
additionalFiles:
  - README.md
  - LICENSE.md
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
labels:
  - bench
  - datastore
  - load-test
  - performance
