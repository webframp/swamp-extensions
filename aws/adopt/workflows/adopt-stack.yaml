id: eb3aa3b7-04c5-4f62-81fb-f150fcf820dc
name: "@webframp/adopt-stack"
description: |
  Orchestrate brownfield adoption of existing AWS infrastructure.
  Runs get and sync on pre-created swamp models in dependency order:
  networking first, then database, then secrets, then verification.

  Models must be pre-created from discover_all output before running
  this workflow. The workflow references models by deterministic names
  derived from the prefix and resource identifiers.

  Resources whose IDs cannot be derived from workflow inputs (subnets,
  route tables, security groups) should be imported individually via
  their respective model get methods.
tags:
  aws: "true"
  adoption: "true"
  brownfield: "true"
  infrastructure: "true"
reports:
  require: ["@webframp/adopt-report"]
inputs:
  properties:
    vpcId:
      type: string
      description: VPC ID being adopted (e.g., vpc-0abc12345)
    clusterIdentifier:
      type: string
      description: RDS cluster identifier to adopt
    dbSubnetGroupName:
      type: string
      description: DB subnet group name (optional, used for subnet group step)
    prefix:
      type: string
      default: adopt
      description: Model name prefix used during creation
  required:
    - vpcId
jobs:
  - name: adopt-networking
    description: Import networking resources starting with the VPC
    steps:
      - name: get-vpc
        description: Adopt the target VPC by running get with its identifier
        task:
          type: model_method
          modelIdOrName: "${inputs.prefix}-vpc-${inputs.vpcId[-9:]}"
          methodName: get
          inputs:
            identifier: "${inputs.vpcId}"
        allowFailure: true

  - name: adopt-database
    description: Import RDS database resources that depend on networking
    dependsOn:
      - adopt-networking
    steps:
      - name: get-db-subnet-group
        description: Adopt the DB subnet group associated with the cluster
        task:
          type: model_method
          modelIdOrName: "${inputs.prefix}-dbsubnet-${inputs.dbSubnetGroupName}"
          methodName: get
          inputs:
            identifier: "${inputs.dbSubnetGroupName}"
        allowFailure: true

      - name: get-rds-cluster
        description: Adopt the RDS cluster by its identifier
        task:
          type: model_method
          modelIdOrName: "${inputs.prefix}-cluster-${inputs.clusterIdentifier}"
          methodName: get
          inputs:
            identifier: "${inputs.clusterIdentifier}"
        allowFailure: true

  - name: adopt-secrets
    description: Import secrets associated with adopted resources
    dependsOn:
      - adopt-database
    steps:
      - name: get-secrets
        description: Adopt secrets related to the database cluster
        task:
          type: model_method
          modelIdOrName: "${inputs.prefix}-secret-${inputs.clusterIdentifier}"
          methodName: get
        allowFailure: true

  - name: verify-adoption
    description: Verify adopted resources by syncing live state
    dependsOn:
      - adopt-networking
      - adopt-database
      - adopt-secrets
    steps:
      - name: sync-vpc
        description: Sync VPC model to confirm live state matches
        task:
          type: model_method
          modelIdOrName: "${inputs.prefix}-vpc-${inputs.vpcId[-9:]}"
          methodName: sync
        allowFailure: true

      - name: sync-rds-cluster
        description: Sync RDS cluster model to confirm live state matches
        task:
          type: model_method
          modelIdOrName: "${inputs.prefix}-cluster-${inputs.clusterIdentifier}"
          methodName: sync
        allowFailure: true

version: 1
