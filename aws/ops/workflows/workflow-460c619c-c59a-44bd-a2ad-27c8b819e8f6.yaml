id: 460c619c-c59a-44bd-a2ad-27c8b819e8f6
name: "@webframp/morning-pulse"
description: |
  Daily morning infrastructure pulse check.
  Gathers alarm state, alarm health verdicts, cost trend, and open PRs
  across user-specified regions, then generates a concise morning-pulse
  report you can skim in two minutes.

  Region-flexible via forEach — pass any combination of regions as input.
  Model instances must follow the naming convention:
    aws-alarms-{region}, alarm-investigation-{region}
tags:
  ops: "true"
  daily: "true"
  aws: "true"
reports:
  require:
    - "@webframp/morning-pulse-report"
inputs:
  properties:
    regions:
      type: array
      items: { type: string }
      default: ["us-east-1"]
      description: AWS regions to check (requires aws-alarms-{region} and alarm-investigation-{region} model instances)
    repo:
      type: string
      default: "webframp/swamp-extensions"
      description: GitHub repo (owner/name) to check for open PRs
    costDays:
      type: integer
      default: 7
      description: Number of days for cost trend lookback
  required: []
jobs:
  - name: alarms
    description: Alarm summary and active alarms across all regions
    steps:
      - name: summary-${{ self.region }}
        description: Get alarm state counts and recent changes
        forEach:
          item: region
          in: ${{ inputs.regions }}
        task:
          type: model_method
          modelIdOrName: aws-alarms-${{ self.region }}
          methodName: get_summary
          inputs:
            historyHours: 24
        allowFailure: true

      - name: active-${{ self.region }}
        description: Get alarms currently in ALARM state
        forEach:
          item: region
          in: ${{ inputs.regions }}
        task:
          type: model_method
          modelIdOrName: aws-alarms-${{ self.region }}
          methodName: get_active
          inputs:
            limit: 50
        allowFailure: true

  - name: alarm-triage
    description: Triage active alarms with verdicts
    dependsOn:
      - job: alarms
        condition:
          type: completed
    steps:
      - name: triage-${{ self.region }}
        description: Enrich alarms with health verdicts
        forEach:
          item: region
          in: ${{ inputs.regions }}
        task:
          type: model_method
          modelIdOrName: alarm-investigation-${{ self.region }}
          methodName: triage
          inputs:
            limit: 100
        allowFailure: true

  - name: costs
    description: Cost trend for the last N days
    steps:
      - name: trend
        description: Daily cost trend and direction
        task:
          type: model_method
          modelIdOrName: aws-costs
          methodName: get_cost_trend
          inputs:
            days: ${{ inputs.costDays }}
        allowFailure: true

      - name: by-service
        description: Cost breakdown by service
        task:
          type: model_method
          modelIdOrName: aws-costs
          methodName: get_cost_by_service
          inputs:
            days: ${{ inputs.costDays }}
        allowFailure: true

  - name: github
    description: Check for open pull requests
    steps:
      - name: open-prs
        description: List open PRs on the target repo
        task:
          type: model_method
          modelIdOrName: github
          methodName: list_prs
          inputs:
            repo: ${{ inputs.repo }}
            state: open
        allowFailure: true

version: 1
