id: c3866eb0-6190-4154-b8e1-304624aba93e
name: "@webframp/investigate-outage"
description: |
  Unified AWS outage investigation workflow.
  Gathers data from CloudWatch Logs, Metrics, Alarms, X-Ray Traces,
  resource inventory, and networking to provide a comprehensive view
  of system health during an incident.
tags:
  incident-response: "true"
  aws: "true"
  observability: "true"
reports:
  require:
    - "@webframp/incident-report"
inputs:
  properties:
    region:
      type: string
      default: us-east-1
      description: AWS region to investigate
    timeRange:
      type: string
      default: 1h
      description: Time range to look back (e.g., 30m, 1h, 6h)
    logGroupPrefix:
      type: string
      description: Optional log group prefix to filter (e.g., /aws/lambda)
    namespace:
      type: string
      description: Optional CloudWatch namespace to filter metrics (e.g., AWS/Lambda)
  required: []
jobs:
  - name: gather-observability-data
    description: Collect data from all observability sources in parallel
    steps:
      - name: check-alarms
        description: Get alarm summary and active alarms
        task:
          type: model_method
          modelIdOrName: aws-alarms
          methodName: get_summary
          inputs:
            startTime: ${{ inputs.timeRange }}
        allowFailure: true

      - name: get-active-alarms
        description: Get all currently active alarms
        task:
          type: model_method
          modelIdOrName: aws-alarms
          methodName: get_active
          inputs:
            limit: 50
        allowFailure: true

      - name: analyze-metrics
        description: Analyze Lambda Duration metrics for anomalies
        task:
          type: model_method
          modelIdOrName: aws-metrics
          methodName: analyze
          inputs:
            namespace: AWS/Lambda
            metricName: Duration
            dimensions: []
            statistic: Average
            startTime: ${{ inputs.timeRange }}
            anomalyThreshold: 2
        allowFailure: true

      - name: analyze-errors-metric
        description: Analyze Lambda Errors metrics
        task:
          type: model_method
          modelIdOrName: aws-metrics
          methodName: analyze
          inputs:
            namespace: AWS/Lambda
            metricName: Errors
            dimensions: []
            statistic: Sum
            startTime: ${{ inputs.timeRange }}
            anomalyThreshold: 2
        allowFailure: true

      - name: analyze-elb-5xx
        description: Analyze ALB 5XX error count
        task:
          type: model_method
          modelIdOrName: aws-metrics
          methodName: analyze
          inputs:
            namespace: AWS/ApplicationELB
            metricName: HTTPCode_ELB_5XX_Count
            dimensions: []
            statistic: Sum
            startTime: ${{ inputs.timeRange }}
            anomalyThreshold: 2
        allowFailure: true

      - name: analyze-elb-latency
        description: Analyze ALB target response time
        task:
          type: model_method
          modelIdOrName: aws-metrics
          methodName: analyze
          inputs:
            namespace: AWS/ApplicationELB
            metricName: TargetResponseTime
            dimensions: []
            statistic: Average
            startTime: ${{ inputs.timeRange }}
            anomalyThreshold: 2
        allowFailure: true

      - name: get-service-graph
        description: Get X-Ray service dependency graph
        task:
          type: model_method
          modelIdOrName: aws-traces
          methodName: get_service_graph
          inputs:
            startTime: ${{ inputs.timeRange }}
        allowFailure: true

      - name: get-error-traces
        description: Get traces with errors or faults
        task:
          type: model_method
          modelIdOrName: aws-traces
          methodName: get_errors
          inputs:
            startTime: ${{ inputs.timeRange }}
            errorType: any
            limit: 50
        allowFailure: true

      - name: analyze-trace-errors
        description: Analyze error patterns in traces
        task:
          type: model_method
          modelIdOrName: aws-traces
          methodName: analyze_errors
          inputs:
            startTime: ${{ inputs.timeRange }}
        allowFailure: true

  - name: gather-logs
    description: Search logs for errors (runs in parallel with observability)
    steps:
      - name: list-log-groups
        description: Discover log groups
        task:
          type: model_method
          modelIdOrName: aws-logs
          methodName: list_log_groups
          inputs:
            prefix: ${{ inputs.logGroupPrefix }}
            limit: 50
        allowFailure: true

      - name: find-lambda-errors
        description: Search Lambda log groups for error patterns
        task:
          type: model_method
          modelIdOrName: aws-logs
          methodName: find_errors
          inputs:
            logGroupNames:
              - /aws/lambda
            startTime: ${{ inputs.timeRange }}
            limit: 100
        allowFailure: true

  - name: gather-infrastructure
    description: Collect resource inventory and networking state (runs in parallel)
    steps:
      - name: list-ec2-instances
        description: List EC2 instances across all states
        task:
          type: model_method
          modelIdOrName: aws-inventory
          methodName: list_ec2
          inputs:
            stateFilter:
              - running
              - stopped
              - stopping
              - pending
        allowFailure: true

      - name: list-lambda-functions
        description: List Lambda functions
        task:
          type: model_method
          modelIdOrName: aws-inventory
          methodName: list_lambda
        allowFailure: true

      - name: list-load-balancers
        description: List ALBs and NLBs with target health
        task:
          type: model_method
          modelIdOrName: aws-networking
          methodName: list_load_balancers
        allowFailure: true

      - name: list-nat-gateways
        description: List NAT gateway status
        task:
          type: model_method
          modelIdOrName: aws-networking
          methodName: list_nat_gateways
        allowFailure: true

  - name: deep-dive
    description: Perform deeper analysis based on initial findings
    dependsOn:
      - job: gather-observability-data
        condition:
          type: completed
      - job: gather-logs
        condition:
          type: completed
      - job: gather-infrastructure
        condition:
          type: completed
    steps:
      - name: get-alarm-history
        description: Get alarm state change history
        task:
          type: model_method
          modelIdOrName: aws-alarms
          methodName: get_history
          inputs:
            startTime: ${{ inputs.timeRange }}
            historyItemType: StateUpdate
            limit: 100
        allowFailure: true

version: 1
