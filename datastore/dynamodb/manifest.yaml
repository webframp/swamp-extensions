manifestVersion: 1
name: "@webframp/dynamodb-datastore"
version: "2026.07.23.1"
description: >
  Stores swamp runtime data in AWS DynamoDB with conditional-write distributed
  locking (fencing tokens + TTL-as-defense-in-depth) and chunked blob storage
  for items exceeding DynamoDB's 400KB size limit.
license: Apache-2.0
repository: https://github.com/webframp/swamp-extensions
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
labels: [dynamodb, aws, nosql, datastore]
datastores:
  - dynamodb_datastore/mod.ts
additionalFiles:
  - README.md
  - LICENSE.md
