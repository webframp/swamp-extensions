manifestVersion: 1
name: "@webframp/redmine"
version: "2026.04.30.2"
description: |
  Redmine issue tracker integration — workflow-agnostic CRUD model.

  Provides 26 model methods covering issues, projects, statuses, trackers,
  users, custom fields, relations, versions, time entries, watchers, search,
  issue categories, journal editing, and file uploads. Designed as composable
  primitives for building any workflow on top of Redmine.

  For opinionated Kanban workflows, flow metrics, and sprint reports, see
  @webframp/redmine-kanban.

  ## Quick Start

  ```bash
  swamp extension pull @webframp/redmine
  swamp model create @webframp/redmine tracker \
    --global-arg host=https://your-redmine.example.org \
    --global-arg apiKey=YOUR_API_KEY \
    --global-arg project=your-project
  ```
repository: "https://github.com/webframp/swamp-extensions"
models:
  - redmine/redmine.ts
labels:
  - redmine
  - issue-tracker
  - api
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
additionalFiles:
  - README.md
  - LICENSE.md
