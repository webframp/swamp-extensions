manifestVersion: 1
name: "@webframp/rice-scoring"
version: "2026.06.05.1"
description: |
  RICE scoring methodology as an agent-guided framework.
  Accepts items, conducts structured interviews to derive
  Reach, Impact, Confidence, and Effort values, produces
  ranked versioned scorecards.

  Configurable scales via globalArguments allow teams to
  anchor scoring in their own context.
