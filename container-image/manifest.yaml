manifestVersion: 1
name: "@webframp/container-image"
version: "2026.07.13.1"
description: "Build, push, and inspect OCI container images. Registry-agnostic — works with ECR, GHCR, DockerHub, or any OCI-compliant registry. Supports docker, podman, nerdctl, and buildah. Produces typed, versioned build metadata."
repository: "https://github.com/webframp/swamp-extensions"
models:
  - container_image.ts
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
additionalFiles:
  - README.md
  - LICENSE.md
labels:
  - container
  - docker
  - buildah
  - podman
  - oci
  - build
  - registry
