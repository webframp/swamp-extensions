id: ada3d8bb-9cde-436e-8bbc-7a45add10e8d
name: '@webframp/cloudflare-audit'
description: |
  Cloudflare security and configuration audit.
  Inspects zone settings, DNS records, WAF rules, Workers, and cache config,
  then generates a severity-rated report with findings and recommendations.
tags:
  cloudflare: 'true'
  security: 'true'
  audit: 'true'
reports:
  require:
    - '@webframp/cloudflare-audit-report'
inputs:
  properties:
    zoneId:
      type: string
      description: Cloudflare zone ID to audit
  required:
    - zoneId
jobs:
  - name: zone-config
    description: Gather zone-level settings and metadata
    steps:
      - name: list-zones
        description: List all zones in the account
        task:
          type: model_method
          modelIdOrName: cf-zone
          methodName: list
        allowFailure: true

      - name: get-settings
        description: Get zone settings (SSL, HTTPS, security headers)
        task:
          type: model_method
          modelIdOrName: cf-zone
          methodName: get_settings
          inputs:
            zoneId: ${{ inputs.zoneId }}
        allowFailure: true

  - name: security
    description: Gather WAF and firewall posture data
    steps:
      - name: list-rules
        description: List all firewall rules
        task:
          type: model_method
          modelIdOrName: cf-waf
          methodName: list_rules
        allowFailure: true

      - name: list-packages
        description: List WAF managed rulesets
        task:
          type: model_method
          modelIdOrName: cf-waf
          methodName: list_packages
        allowFailure: true

      - name: security-events
        description: Get recent security events
        task:
          type: model_method
          modelIdOrName: cf-waf
          methodName: get_security_events
          inputs:
            limit: 100
        allowFailure: true

  - name: dns-and-edge
    description: Gather DNS records, Workers, and cache config
    steps:
      - name: list-dns
        description: List all DNS records in the zone
        task:
          type: model_method
          modelIdOrName: cf-dns
          methodName: list
        allowFailure: true

      - name: list-workers
        description: List all Worker scripts
        task:
          type: model_method
          modelIdOrName: cf-worker
          methodName: list_scripts
        allowFailure: true

      - name: list-routes
        description: List Worker routes for the zone
        task:
          type: model_method
          modelIdOrName: cf-worker
          methodName: list_routes
          inputs:
            zoneId: ${{ inputs.zoneId }}
        allowFailure: true

      - name: cache-settings
        description: Get cache-related zone settings
        task:
          type: model_method
          modelIdOrName: cf-cache
          methodName: get_settings
        allowFailure: true

      - name: cache-analytics
        description: Get cache hit rate and bandwidth analytics
        task:
          type: model_method
          modelIdOrName: cf-cache
          methodName: get_analytics
        allowFailure: true

  - name: finalize
    description: Trigger report generation after all data gathering completes
    dependsOn:
      - job: zone-config
        condition:
          type: completed
      - job: security
        condition:
          type: completed
      - job: dns-and-edge
        condition:
          type: completed
    steps:
      - name: zone-detail
        description: Fetch zone detail for report context
        task:
          type: model_method
          modelIdOrName: cf-zone
          methodName: get
          inputs:
            zoneId: ${{ inputs.zoneId }}
        allowFailure: true
version: 1
