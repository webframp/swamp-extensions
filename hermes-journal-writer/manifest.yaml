manifestVersion: 1
name: "@webframp/hermes-journal-writer"
version: "2026.07.20.1"
description: |
  Journal Writer — reads research-collector data from the swamp catalog and
  writes org-mode journal entries to ~/org/journal/. Commits and pushes to the
  org repo so entries become part of your living knowledge store.

  ## Methods

  - **write_daily_entry** — Writes a daily research summary to
    ~/org/journal/YYYY-MM-DD-dow.org with property drawer, source links,
    and summaries from HN, Lobste.rs, SRE Weekly, IFIN, and RedMonk.
repository: "https://github.com/webframp/swamp-extensions"
models:
  - hermes-journal-writer/hermes_jrnl_writer.ts
labels:
  - journal
  - org
  - research
  - writing
  - hermes
platforms:
  - linux-x86_64
  - linux-aarch64
additionalFiles:
  - README.md
  - LICENSE.md